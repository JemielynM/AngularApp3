<h2>Delete Book</h2>

<p *ngIf="message">{{ message }}</p>

<div *ngIf="books.length === 0">
  No books available.
</div>

<div *ngFor="let book of books">
  <h3>{{ book.title }}</h3>
  <p><b>Author:</b> {{ book.author }}</p>
  <p>{{ book.description }}</p>

  <button (click)="deleteBook(book.id)">
    Delete
  </button>

  <hr>
</div>
